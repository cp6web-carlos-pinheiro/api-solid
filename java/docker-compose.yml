version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: mysql-store
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: store
      MYSQL_USER: store
      MYSQL_PASSWORD: store123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: